services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: hireiq
      POSTGRES_USER: hireiq
      POSTGRES_PASSWORD: hireiq_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hireiq"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://hireiq:hireiq_secret@db:5432/hireiq
      SECRET_KEY: super-secret-jwt-key-change-in-prod
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./backend:/app
      - resume_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    command: npm run dev -- --host 0.0.0.0 --port 3000

volumes:
  postgres_data:
  resume_uploads:
